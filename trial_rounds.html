<head>

    <!-- jsPsych v7 -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

    <style>
        body {
            background: #fff;
            line-height: 1.5;
        }

        #jspsych-target,
        .jspsych-content,
        .jspsych-content * {
            line-height: 1.5;
        }

        .jspsych-content p {
            margin: 0 0 0.9em 0;
        }

        .jspsych-content h2,
        .jspsych-content h3 {
            margin: 0 0 0.6em 0;
        }

        .jspsych-content {
            max-width: 900px;
        }

        .center {
            text-align: center;
        }

        .big {
            font-size: 28px;
        }

        .mid {
            font-size: 22px;
        }

        .small {
            font-size: 16px;
            color: #444;
        }

        .spacer {
            height: 18px;
        }

        .slider-wrap {
            margin-top: 18px;
        }

        .amount-preview {
            font-size: 28px;
            font-weight: 700;
            margin-top: 10px;
        }

        /* 質問項目 */
        .qwrap {
            margin: 10px 0 18px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .qtitle {
            margin-bottom: 8px;
            font-size: 18px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 6px;
        }

        .btn-group button {
            width: 44px;
            height: 44px;
            font-size: 18px;
            border: 2px solid #aaa;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-group button.selected {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }

        .btn-group button:hover {
            border-color: #666;
        }

        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        /* スライダー質問 */
        .range-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .range-row span {
            width: 80px;
            text-align: center;
            color: #333;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
        }

        /* 投資スライダー：未操作時はつまみを隠す */
        input[type="range"].slider-hidden-thumb::-webkit-slider-thumb {
            opacity: 0;
        }

        input[type="range"].slider-hidden-thumb::-moz-range-thumb {
            opacity: 0;
        }

        /* スピナー */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #ddd;
            border-top: 6px solid #555;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 24px auto 0;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        #jspsych-target {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== ゲームボード ===== */
        .game-board {
            width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .gb-opponent,
        .gb-player {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 12px;
            justify-content: flex-start;
        }

        .gb-avatar {
            font-size: 48px;
            line-height: 1;
        }

        .gb-name {
            font-size: 16px;
            font-weight: 700;
        }

        .gb-total {
            font-size: 14px;
            color: #555;
        }

        .gb-score-right {
            position: absolute;
            right: 0;
            top: 8px;
            text-align: right;
            font-size: 13px;
            color: #666;
        }

        .gb-score-left {
            position: absolute;
            right: 0;
            bottom: 8px;
            text-align: right;
            font-size: 13px;
            color: #666;
        }

        .gb-mid {
            text-align: center;
            margin: 12px 0;
            font-size: 15px;
            color: #444;
            border-top: 1px dashed #ccc;
            border-bottom: 1px dashed #ccc;
            padding: 6px 0;
        }

        /* ゲージバー */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 16px;
        }

        .bar-label {
            font-size: 13px;
            color: #666;
            width: 70px;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: #e8e8e8;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 700;
            box-sizing: border-box;
            min-width: 0;
        }

        .bar-fill.gold {
            background: linear-gradient(90deg, #ffd700, #f0a500);
            color: #6b4f00;
            justify-content: flex-end;
        }

        .bar-fill.sent {
            background: linear-gradient(90deg, #ccc, #aaa);
            color: #555;
            justify-content: flex-end;
        }

        .bar-fill.green {
            background: linear-gradient(90deg, #66dd88, #2ecc71);
            color: #145a32;
            justify-content: flex-end;
        }

        .bar-fill.red {
            background: linear-gradient(90deg, #ff8888, #e74c3c);
            color: #5a0000;
            justify-content: flex-end;
        }

        /* バーアニメ */
        @keyframes barGrow {
            0% {
                max-width: 0
            }

            100% {
                max-width: 100%
            }
        }

        @keyframes barPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.6
            }
        }

        .bar-fill.grow {
            animation: barGrow 0.8s ease-out forwards;
        }

        .bar-fill.pulse {
            animation: barPulse 1s ease-in-out infinite;

        /* 思考中バブル */
        @keyframes float {

        .thinking-bubble {

            border-radius: 16px;

            color: #666;
            animation: float 1.5s ease-in-out infinite;
        }

        /* アイコン選択 */
        .icon-choices {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin: 18px 0;
        }

        .icon-choice {
            cursor: pointer;
            text-align: center;
            padding: 12px 18px;
            border: 3px solid transparent;
            border-radius: 16px;
            transition: 0.2s;
        }

        .icon-choice:hover {
            border-color: #aaa;
            background: #f8f8f8;
        }

        .icon-choice.selected {
            border-color: #4a90d9;
            background: #e8f0fe;
        }

        .icon-choice .ic-emoji {
            font-size: 56px;
        }

        .icon-choice .ic-label {
            font-size: 14px;
            margin-top: 4px;
        }

        /* デバッグ用パラメータ表示 */
        #debug-info {

            right: 12px;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.85);
            color: #0f0;

            font-size: 12px;

            border-radius: 6px;
            line-height: 1.6;

        }

        #debug-info .label {

        /* デバッグ用スキップボタン */
        #debug-skip-btn {
            position: fixed;

            right: 16px;
            z-index: 99999;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #debug-skip-btn:hover {
            background: #c0392b;
        }
    </style>

<body>

  ">

</body>

<script>
    "use strict";

    /* =========================================================
       パラメータ定数（pilotで調整しやすいよう分離）
    ========================================================= */
    const PARAMS = {
        lambda: 0.30,        // EMA減衰率
        theta: 0.25,         // 評判ストック閾値
        kappa: 0.20,         // 評判感度（全相手共通）
        mu_high: 0.343,      // 高ベース返報率
        mu_low: 0.323,       // 低ベース返報率
        sigma_eta: 0.01,     // 返報率ノイズSD（毎試行）
        sigma_delta: 0.02,   // 相手ごとオフセットSD
        r_min: 0.25,         // 返報率下限
        r_max: 0.55,         // 返報率上限
        multiplier: 3,       // 投資倍率（投資額が相手に渡るとき3倍）
        endowment: 100,      // 毎ラウンドの持ち点
        invest_step: 1,      // 投資額刻み（1円単位）
        invest_min: 30,      // 最低投資額
        invest_max: 100,     // 投資額上限
        invest_timeout: null,  // 投資画面タイムアウト(ms) ※nullで無制限
        return_display_ms: 4000, // 返報表示時間(ms)
        short_rounds_min: 4,
        short_rounds_max: 5,
        long_rounds_min: 10,
        long_rounds_max: 12,
        donation_max: 1000,
        donation_step: 10,
    };

    /* =========================================================
       ユーティリティ関数
    ========================================================= */
    function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    const clamp = (x, lo, hi) => Math.max(lo, Math.min(hi, x));
    const roundTo5 = (x) => Math.round(x / 5) * 5; // 寄付課題等で使用

    // Box-Muller法 正規分布 N(0,1)
    function randn() {
        let u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    // 配列シャッフル（Fisher-Yates）
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // インストラクションページ生成
    function instructionPage(html) {
        return {
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="mid">${html}</div>`,
            choices: ["次へ"]
        };
    }

    /* =========================================================
       アバター・ゲーム状態
    ========================================================= */
    const PLAYER_ICONS = [
        { emoji: "🐱", label: "ネコ" },
        { emoji: "🐶", label: "イヌ" },
        { emoji: "🐰", label: "ウサギ" },
    ];
    const OPPONENT_ICONS = [
        { emoji: "🦊", label: "キツネ" },
        { emoji: "🐼", label: "パンダ" },
        { emoji: "🦁", label: "ライオン" },
        { emoji: "🐸", label: "カエル" },
        { emoji: "🦉", label: "フクロウ" },
        { emoji: "🐧", label: "ペンギン" },
        { emoji: "🐻", label: "クマ" },
        { emoji: "🐯", label: "トラ" },
    ];
    const OPPONENT_NAMES = ["dai_k", "m99", "taku3", "ryo_s", "hina02", "sora", "kei_77", "yuu_t", "nao5", "ren_x"];

    const GAME = {
        playerName: "",
        playerIcon: "",
        playerTotal: 0,
        opponentTotal: 0,
    };

    // ゲームボードHTML生成
    function makeGameBoardHtml(opts) {
        const { roundNum, oppIcon, oppName, content, oppBarsHtml, playerBarsHtml } = opts;
        return `
    <div class="game-board">
      <div class="gb-opponent">
        <div class="gb-avatar">${oppIcon}</div>
        <div><div class="gb-name">${oppName}</div><div class="gb-total">合計: <span id="opp-total">${GAME.opponentTotal}</span>円</div></div>
      </div>
      <div id="opp-bars">${oppBarsHtml || ""}</div>
      <div class="gb-mid">ラウンド：${roundNum}回目</div>
      <div id="my-bars">${playerBarsHtml || ""}</div>
      <div class="gb-player">
        <div class="gb-avatar">${GAME.playerIcon}</div>
        <div><div class="gb-name">${GAME.playerName}</div><div class="gb-total">合計: <span id="my-total">${GAME.playerTotal}</span>円</div></div>
      </div>
      ${content || ""}
    </div>`;
    }

    // ゲージバーHTML生成（100円=1段、超過分は段を増やす）
    function makeBar(label, yen, barUnit, cssClass, extraBarClass) {
        const barCls = extraBarClass ? `bar-fill ${cssClass} ${extraBarClass}` : `bar-fill ${cssClass}`;
        if (yen <= 0) {
            return `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="${barCls}" style="width:0%"></div></div>
    </div>`;
        }
        let remaining = yen;
        const rows = [];
        const numRows = Math.ceil(yen / barUnit);
        for (let i = 0; i < numRows; i++) {
            const seg = Math.min(remaining, barUnit);
            remaining -= seg;
            const pct = (seg / barUnit) * 100;
            const showLabel = i === 0 ? label : "";
            const text = (i === numRows - 1) ? `${yen}円` : "";
            rows.push(`<div class="bar-row">
      <div class="bar-label">${showLabel}</div>
      <div class="bar-track"><div class="${barCls}" style="width:${pct}%">${text}</div></div>
    </div>`);
        }
        return rows.join("");
    }

    // ISI（注視点）
    function makeFixationISI(dataObj) {
        return {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div style="font-size:40px;">+</div>',
            choices: "NO_KEYS",
            trial_duration: randInt(1500, 3000),
            data: Object.assign({ trial_kind: "isi" }, dataObj)
        };
    }

    /* =========================================================
       投資額配列
    ========================================================= */
    const AMOUNTS = Array.from(
        { length: (PARAMS.invest_max - PARAMS.invest_min) / PARAMS.invest_step + 1 },
        (_, i) => PARAMS.invest_min + i * PARAMS.invest_step
    ); // [30, 31, 32, ..., 100]

    /* =========================================================
       実験デザイン生成
    ========================================================= */
    function generateDesign() {
        // 4条件 = Short/Long × μ_low/μ_high, 各2相手 = 8ブロック
        const conditions = [
            { duration: "short", mu_type: "low" },
            { duration: "short", mu_type: "high" },
            { duration: "long", mu_type: "low" },
            { duration: "long", mu_type: "high" },
        ];

        const blocks = [];
        conditions.forEach(c => {
            // 各相手に小さな個人差 δ_j を付与
            const d1 = randn() * PARAMS.sigma_delta;
            const d2 = randn() * PARAMS.sigma_delta;
            blocks.push({ ...c, partnerIndex: 1, delta_j: d1 });
            blocks.push({ ...c, partnerIndex: 2, delta_j: d2 });
        });
        return shuffle(blocks);
    }

    // 相手IDラベル生成
    function generatePartnerIds(n) {
        const ids = [];
        for (let i = 0; i < n; i++) {
            ids.push(`P${String(i + 1).padStart(2, "0")}`);
        }
        return shuffle(ids);
    }

    /* =========================================================
       返報生成ロジック
    ========================================================= */
    function computeReturn(g, s_prev, mu, delta_j) {
        // 返報率: r_t = clip(μ_type + δ_j + κ·s_t + η_t, r_min, r_max)
        // ※ s_t はラグ付き（今回の投資はまだ反映されていない）
        const eta = randn() * PARAMS.sigma_eta;
        const r = clamp(mu + delta_j + PARAMS.kappa * s_prev + eta, PARAMS.r_min, PARAMS.r_max);

        // 返報額 = round(multiplier * g * r)
        const received = PARAMS.multiplier * g;
        const y = clamp(Math.round(received * r), 0, received);

        // 評判ストック更新（次試行から効く）: s_{t+1} = (1-λ)s_t + λ(g_t/100 - θ)
        const s_next = (1 - PARAMS.lambda) * s_prev + PARAMS.lambda * (g / 100 - PARAMS.theta);

        return { s_next, r, eta, y };
    }

    /* =========================================================
       jsPsych初期化
    ========================================================= */
    let jsPsych;

    /* =========================================================
       デバッグ用ツール
    ========================================================= */
    const debugInfoEl = document.getElementById("debug-info");
    let debugInfoVisible = false;

    // デバッグ情報更新関数
    function updateDebugInfo(info) {
        if (!debugInfoVisible) return;
        const lines = Object.entries(info).map(
            ([k, v]) => `<span class="label">${k}:</span> ${v}`
        );
        debugInfoEl.innerHTML = lines.join("<br>");
    }

    /* =========================================================
       タイムライン構築
    ========================================================= */
    const timeline = [];



    /* =========================================================
       ハンドルネーム・アイコン選択
    ========================================================= */
    // 名前入力
    timeline.push({
        type: jsPsychSurveyText,
        questions: [{ prompt: "ゲームで使用するハンドルネームを入力してください", name: "handle", required: true }],
        data: { phase: "setup", trial_kind: "handle_name" },
        on_finish: (data) => { GAME.playerName = data.response.handle; }
    });

    // アイコン選択
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
    <div class="center">
      <h2>アイコンを選んでください</h2>
      <div class="icon-choices">
        ${PLAYER_ICONS.map((ic, i) => `
          <div class="icon-choice" data-idx="${i}" onclick="
            document.querySelectorAll('.icon-choice').forEach(e=>e.classList.remove('selected'));
            this.classList.add('selected');
            window.__selectedIcon=${i};
          ">
            <div class="ic-emoji">${ic.emoji}</div>
            <div class="ic-label">${ic.label}</div>
          </div>
        `).join("")}
      </div>
    </div>`,
        choices: ["決定"],
        data: { phase: "setup", trial_kind: "icon_select" },
        on_load: () => { window.__selectedIcon = 0; },
        on_finish: (data) => {
            const idx = window.__selectedIcon || 0;
            GAME.playerIcon = PLAYER_ICONS[idx].emoji;
            data.player_icon = PLAYER_ICONS[idx].label;
        }
    });

    /* =========================================================
       インストラクション—ネストタイムライン
    ========================================================= */
    timeline.push({
        timeline: [
            instructionPage(`
    <p>この課題では、あなたと相手の間で「投資」と「返報」のやり取りを行います。
    ブロックが変わると、相手は別の相手になります。</p>
    <p>相手とのやり取り回数は2種類あります：</p>
    <ul style="text-align:left; display:inline-block;">
      <li>短期：4〜5回</li>
      <li>長期：10〜12回</li>
    </ul>
    <p>どちらの相手かはブロック冒頭で表示されます。</p>
  `),
            instructionPage(`
    <p>毎ラウンド、あなたは総額100円を持ちます。</p>
    <p><strong>【投資（あなた → 相手）】</strong><br>
    相手に投資する額をスライダーで選び、［確定］を押してください。<br>
    あなたの手元には 100 − 投資額 が残ります。</p>
    <p><strong>投資した額は、相手に渡るときに3倍になります。</strong></p>
    <p><strong>【返報（相手 → あなた）】</strong><br>
    相手があなたに返す額が画面に表示されます。<br>
    （相手からの返報を拒否することはできません）</p>
    <p>課題の途中で、相手の印象や今後の予想について質問が表示されます。
    あまり深く考えすぎず、<strong>その時その瞬間の直感</strong>で回答してください。</p>
  `),
            instructionPage(`

        // Thinking screen

    /* =========================================================

    const design = generateDesign();

    /* =========================================================
   Practice Block
========================================================= */



    // 相手アイコンプール（シャッフルして割り当て）
    const shuffledOppIcons = shuffle(OPPONENT_ICONS);

    design.forEach((block, blockIdx) => {

        const oppName = shuffledOppNames[blockIdx % shuffledOppNames.length];
        const getMu = () => block.mu_type === "high" ? PARAMS.mu_high : PARAMS.mu_low;
        const delta_j = block.delta_j;
        const numRounds = block.duration === "short"
            ? randInt(PARAMS.short_rounds_min, PARAMS.short_rounds_max)
            : randInt(PARAMS.long_rounds_min, PARAMS.long_rounds_max);
        const durationLabel = block.duration === "short" ? "短期（4〜5回）" : "長期（10〜12回）";
        const condLabel = `${block.duration}_${block.mu_type}_${block.partnerIndex}`;

        // 評判ストック（ラグ付き: s_0 = 0）
        let s = 0;

        // --- フェイクマッチング＋ブロック開始（ネスト） ---
        timeline.push({

                {
                    type: jsPsychHtmlKeyboardResponse,

        for (let round = 1; round <= numRounds; round++) {

            // 投資画面（ゲームボードUI）
            roundsTimeline.push({

            if (roundNum === 4 || roundNum === 8) {

                roundsTimeline.push({

        // --- ブロック終了時質問（7項目、7段階ボタン、順序ランダマイズ） ---
        const blockEndQuestions = [

            { key: "eval_avoid", text: "この相手に悪く思われたくない／嫌われたくないと感じた" },
            { key: "eval_seek", text: "この相手に良く思われたい／好かれたいと感じた" },
            { key: "contingency_belief", text: "自分が多く渡すほど、この相手が返す割合が高くなると感じた" },
        ];
        const shuffledQ = shuffle(blockEndQuestions);
        const blockEndTimeline = [];

        shuffledQ.forEach((q) => {
            blockEndTimeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `

                },

            });

        timeline.push({ timeline: blockEndTimeline });
    });

    /* =========================================================
       実験終了時アンケート（11項目、7段階スライダー、順序ランダマイズ）
    ========================================================= */
    const finalQuestionItems = [
        { key: "recip_altruism_1", text: "今は損でも、将来自分に返ってきそうなら協力する。", subscale: "互恵依存利他" },

        { key: "general_trust_1", text: "たいていの人は信頼できると思う。", subscale: "一般的信頼" },
        { key: "general_trust_2", text: "たいていの人は基本的に正直だと思う。", subscale: "一般的信頼" },
        { key: "eval_concern_1", text: "他人から「自分の利益しか考えない非協力的な人」と思われるのが嫌だ。", subscale: "評価獲得・回避" },
        { key: "eval_concern_2", text: "周囲から自分がどう評価されているかが、いつも気になる。", subscale: "評価獲得・回避" },
        { key: "risk_aversion", text: "一般的に言って、リスク（危険や不確実性）を好んで取る方だ", subscale: "リスク回避" },
    ];

    const shuffledFinalQ = shuffle(finalQuestionItems);
    const finalQTimeline = [];

    finalQTimeline.push(instructionPage(`
  <p>課題は終了しました。</p>
  <p>最後に、あなたの考え方についていくつかお聞きします。<br>
  正解・不正解はありません。直感的にお答えください。</p>
`));

    shuffledFinalQ.forEach((q) => {
        finalQTimeline.push({
            type: jsPsychHtmlSliderResponse,
            stimulus: `
      <div class="center">
        <div class="qwrap">
          <div class="qtitle">${q.text}</div>
        </div>
      </div>`,
            min: 1, max: 7, step: 1, slider_start: 4,
            labels: ["1<br>全くそう<br>思わない", "2", "3", "4", "5", "6", "7<br>非常にそう<br>思う"],
            button_label: "次へ",
            require_movement: true,
            data: {
                phase: "final_questionnaire", trial_kind: "final_q",
                question_key: q.key, subscale: q.subscale
            },
            on_finish: (data) => { data.response_value = parseInt(data.response); }
        });
    });
    timeline.push({ timeline: finalQTimeline });

    /* =========================================================
       寄付課題（匿名/非匿名をランダム割り当て）
    ========================================================= */
    const donationAnonymous = Math.random() < 0.5; // true=匿名, false=非匿名
    const anonymityLabel = donationAnonymous ? "匿名" : "非匿名";
    const anonymityExplanation = donationAnonymous
        ? "個人の氏名は赤十字には伝わらず、研究室がまとめて「匿名」として送金します。"
        : "あなたの「氏名」と「寄付額」が寄付者リストに記載され、赤十字に報告されます。";

    const donationTimeline = [];
    donationTimeline.push({
        type: jsPsychHtmlSliderResponse,
        stimulus: `
    <div class="center">
      <h2>最終ボーナスと寄付のお願い</h2>
      <p>ゲーム終了にともない、追加で1000円があなたに与えられます。<br>
      このうち、任意の金額（10円単位）を日本赤十字社へ寄付することができます。</p>
      <p><strong>【今回の寄付の扱い】</strong> あなたの寄付は、<strong>${anonymityLabel}</strong> として扱われます。</p>
      <p>${anonymityExplanation}</p>
      <p class="small">寄付しない選択をしても不利益は一切ありません。</p>
      <div class="spacer"></div>
      <div id="donation-preview" class="amount-preview">寄付する額：—円</div>
      <div id="donation-keep" class="small">あなたが受け取る額：—円</div>
    </div>`,
        min: 0,
        max: PARAMS.donation_max / PARAMS.donation_step,
        step: 1,
        slider_start: 0,
        labels: ["0円", "500円", "1000円"],
        button_label: "確定",
        require_movement: true,
        data: {
            phase: "donation", trial_kind: "donation_choice",
            anonymity: anonymityLabel
        },
        on_load: () => {
            const slider = document.querySelector("input[type='range']");
            const prevD = document.getElementById("donation-preview");
            const prevK = document.getElementById("donation-keep");
            if (!slider) return;
            slider.addEventListener("input", () => {
                const val = parseInt(slider.value) * PARAMS.donation_step;
                prevD.textContent = `寄付する額：${val}円`;
                prevK.textContent = `あなたが受け取る額：${PARAMS.donation_max - val}円`;
            });
        },
        on_finish: (data) => {
            const val = parseInt(data.response) * PARAMS.donation_step;
            data.donation_amount = val;
            data.donation_keep = PARAMS.donation_max - val;
        }
    });

    // 寄付確認画面
    donationTimeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: () => {
            const donData = jsPsych.data.get().filter({ trial_kind: "donation_choice" }).last(1).values()[0];
            if (!donData) return `<div class="center mid"><p>（スキップされました）</p></div>`;
            return `
      <div class="center mid">
        <h2>寄付内容の確認</h2>
        <p>寄付額：<strong>${donData.donation_amount}円</strong></p>
        <p>あなたが受け取る額：<strong>${donData.donation_keep}円</strong></p>
        <p class="small">（${anonymityLabel}として処理されます）</p>
      </div>`;
        },
        choices: ["確定"],
        data: { phase: "donation", trial_kind: "donation_confirm" }
    });
    timeline.push({ timeline: donationTimeline });

    /* =========================================================
       実験終了
    ========================================================= */
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
    <div class="center mid">
      <p>実験は以上です。ご協力ありがとうございました。</p>
      <p class="small">「終了」を押すとデータが保存されます。</p>
    </div>`,
        choices: ["終了"],
        data: { phase: "end", trial_kind: "end_screen" }
    });

    function startExperiment() {
        document.getElementById("landing-page").style.display = "none";
        document.getElementById("jspsych-target").style.display = "flex";

        jsPsych = initJsPsych({
            display_element: "jspsych-target",
            on_finish: () => {
                const csv = jsPsych.data.get().csv();
                const blob = new Blob([csv], { type: "text/csv" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `trust_game_gamified_ideriha_${Date.now()}.csv`;
                a.click();
            }
        });

        jsPsych.run(timeline);
    }
    const SLIDES_EMBED_URL = "https://docs.google.com/presentation/d/e/2PACX-1vTej7qEIB-rTGX-hzSDlGWk3X8s8t_fvffqAMDcatR5PDdEK6u4VGPuC_0nWaJOAexgI9PhoWPgYRgs/pub?start=false&loop=false&delayms=3000";

    document
        .getElementById("view-instructions-btn")
        .addEventListener("click", () => {
            window.open(SLIDES_EMBED_URL, "_blank");
        });

    document
        .getElementById("start-experiment-btn")
        .addEventListener("click", () => {
            startExperiment();
        });
</script>

</html>
